kind: pipeline
type: docker
name: build-and-push-ironkey-back

steps:

  # ---------------------------------------------------------------------------
  # 1. Build y tests
  #    Corre en develop y main. Usa la misma imagen que el Dockerfile de runtime.
  # ---------------------------------------------------------------------------
  - name: build-and-test
    image: eclipse-temurin:21-jdk-alpine
    volumes:
      - name: gradle_cache
        path: /root/.gradle
    commands:
      - chmod +x gradlew
      - ./gradlew clean
      - ./gradlew build

  # ---------------------------------------------------------------------------
  # 2. Build y push de imagen Docker al registry privado
  #    Solo se ejecuta cuando el push llega a main
  # ---------------------------------------------------------------------------
  - name: docker-build-and-push
    image: plugins/docker
    settings:
      registry: registry.contragamer.com
      repo: registry.contragamer.com/ironkey-back
      tags:
        - latest
        - ${DRONE_BUILD_NUMBER}
        - 0.0.1
      dockerfile: Dockerfile
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
    when:
      branch:
        - main
      event:
        - push

  # ---------------------------------------------------------------------------
  # 3. Deploy en VPS vía SSH
  #    Solo se ejecuta cuando el push llega a main
  # ---------------------------------------------------------------------------
  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: DEPLOY_HOST
      username:
        from_secret: DEPLOY_USER
      key:
        from_secret: DEPLOY_SSH_KEY
      script:
        - cd /root/apps/ironkey
        - docker compose pull
        - docker compose down --remove-orphans
        - docker compose up -d
    when:
      branch:
        - main
      event:
        - push

# -----------------------------------------------------------------------------
# Cache del wrapper de Gradle montado desde el host del runner
# -----------------------------------------------------------------------------
volumes:
  - name: gradle_cache
    host:
      path: /var/cache/gradle

# -----------------------------------------------------------------------------
# Trigger: develop dispara build+test / main dispara build+test+push+deploy
# -----------------------------------------------------------------------------
trigger:
  branch:
    - main
    - develop
  event:
    - push
    - pull_request
