kind: pipeline
type: docker
name: build-and-push-ironkey-back

# -----------------------------------------------------------------------------
# Cache de Gradle montado desde el host del runner de CI
# -----------------------------------------------------------------------------
volumes:
  - name: gradle_cache
    host:
      path: /tmp/gradle_cache

steps:

  # ---------------------------------------------------------------------------
  # 1. Build
  #    Corre en develop y main.
  # ---------------------------------------------------------------------------
  - name: build-and-test
    image: eclipse-temurin:21-jdk-alpine
    volumes:
      - name: gradle_cache
        path: /root/.gradle
    commands:
      - chmod +x gradlew
      - ./gradlew clean build -x test

  # ---------------------------------------------------------------------------
  # 2. Build y push de imagen Docker al registry privado
  #    Solo se ejecuta cuando el push llega a main.
  #
  #    Secrets requeridos en Drone:
  #      REGISTRY_URL      → URL del registry privado
  #      IMAGE_REPO        → Ruta completa de la imagen
  #      REGISTRY_USERNAME → Usuario del registry
  #      REGISTRY_PASSWORD → Contraseña del registry
  # ---------------------------------------------------------------------------
  - name: docker-build-and-push
    image: plugins/docker
    settings:
      registry: registry.contragamer.com
      repo: registry.contragamer.com/ironkey-back
      tags:
        - latest
        - ${DRONE_BUILD_NUMBER}
      dockerfile: Dockerfile
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
    when:
      branch:
        - main
        - develop
      event:
        - push

  # ---------------------------------------------------------------------------
  # 3. Deploy en VPS vía SSH
  #    Solo se ejecuta cuando el push llega a main.
  #
  #    Secrets requeridos en Drone:
  #      DEPLOY_HOST    → IP o dominio del servidor
  #      DEPLOY_USER    → Usuario SSH
  #      DEPLOY_SSH_KEY → Clave privada SSH
  #      DEPLOY_PATH    → Ruta del proyecto en el servidor
  # ---------------------------------------------------------------------------
  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: DEPLOY_HOST
      username:
        from_secret: DEPLOY_USER
      key:
        from_secret: DEPLOY_SSH_KEY
      script:
        - cd /root/apps/ironkey
        - docker compose pull
        - docker compose down --remove-orphans
        - docker compose up -d
    when:
      branch:
        - main
        - develop
      event:
        - push

# -----------------------------------------------------------------------------
# Trigger: develop dispara build / main dispara build + push imagen + deploy
# -----------------------------------------------------------------------------
trigger:
  branch:
    - main
    - develop
  event:
    - push
    - pull_request
