# =============================================================================
# Nginx — Reverse proxy para IronKey Backend
# Dominio configurado: testironkey.contragamer.com
# =============================================================================

events {
    worker_connections 1024;
}

http {

    # Timeouts y buffers
    proxy_read_timeout    90s;
    proxy_connect_timeout 90s;
    proxy_send_timeout    90s;
    client_max_body_size  10m;

    upstream ironkey_back {
        server ironkey-back:8080;
        keepalive 16;
    }

    upstream ironkey_front {
        server ironkey-front:80;
        keepalive 8;
    }

    # -------------------------------------------------------------------------
    # HTTP — solo para el challenge de Certbot y redirección a HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name testironkey.contragamer.com;

        # Certbot necesita este path para la validación del dominio
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS
    # Descomenta este bloque solo después de obtener el certificado con Certbot
    # (ver instrucciones en docker-compose.yml)
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2  on;
        server_name testironkey.contragamer.com;

        # Certificados generados por Certbot
        ssl_certificate     /etc/nginx/certs/live/testironkey.contragamer.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/testironkey.contragamer.com/privkey.pem;

        # Protocolos y cifrados modernos
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout       1d;
        ssl_session_cache         shared:SSL:10m;

        # Headers de seguridad
        add_header X-Frame-Options           "DENY"                            always;
        add_header X-Content-Type-Options    "nosniff"                         always;
        add_header X-XSS-Protection          "1; mode=block"                   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Todo el tráfico va al backend Spring Boot
        location /api/ {
            proxy_pass         http://ironkey_back;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Frontend React — todo lo que no sea /api/ va al contenedor ironkey-front
        location / {
            proxy_pass         http://ironkey_front;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
