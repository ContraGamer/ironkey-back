services:

  # ---------------------------------------------------------------------------
  # Base de datos
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ironkey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ironkey-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend Spring Boot
  # Flyway ejecuta las migraciones automáticamente al arrancar
  # ---------------------------------------------------------------------------
  ironkey-back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ironkey-back
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST:                    postgres
      DB_PORT:                    5432
      DB_NAME:                    ${DB_NAME}
      DB_USER:                    ${DB_USER}
      DB_PASS:                    ${DB_PASS}
      JWT_SECRET:                 ${JWT_SECRET}
      ENCRYPTION_PEPPER:          ${ENCRYPTION_PEPPER}
      IRONKEY_RECOVERY_ENABLED:   ${IRONKEY_RECOVERY_ENABLED:-false}
      CORS_ALLOWED_ORIGINS:       ${CORS_ALLOWED_ORIGINS}
    networks:
      - ironkey-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy + SSL
  #
  # IMPORTANTE — Bootstrap de SSL (primera vez):
  #   1. Comenta el bloque 'server' HTTPS en nginx/nginx.conf
  #   2. Levanta solo nginx:  docker compose up -d nginx
  #   3. Obtén el certificado:
  #      docker run --rm -v /etc/letsencrypt:/etc/letsencrypt \
  #        -v ironkey-back_certbot_webroot:/var/www/certbot \
  #        certbot/certbot certonly --webroot \
  #        -w /var/www/certbot -d tudominio.com --email tuemail@ejemplo.com --agree-tos
  #   4. Descomenta el bloque HTTPS en nginx.conf
  #   5. docker compose restart nginx
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ironkey-nginx
    restart: unless-stopped
    depends_on:
      ironkey-back:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - ironkey-network

# -----------------------------------------------------------------------------
# Volúmenes persistentes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
  certbot_webroot:

# -----------------------------------------------------------------------------
# Red interna — backend y DB no son accesibles desde fuera
# -----------------------------------------------------------------------------
networks:
  ironkey-network:
    driver: bridge
