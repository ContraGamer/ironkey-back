spring:
  datasource:
    url: jdbc:h2:mem:ironkeytest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 (incluso en MODE=PostgreSQL) no soporta sintaxis específica de las migraciones reales
  # (p. ej. gen_random_uuid() en V1__create_users_table.sql), y esas migraciones ya están
  # aplicadas en producción — no se pueden tocar sin romper el checksum de Flyway allí. Para
  # este smoke test de arranque del contexto, Hibernate genera el esquema desde las entidades
  # JPA en vez de ejecutar las migraciones reales.
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

ironkey:
  jwt:
    secret: dGhpcy1pcy1hLXRlc3Qtc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTY0LWNoYXJhY3RlcnMtbG9uZyEh
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  encryption:
    pepper: test_pepper_only_for_tests_32chars!
  recovery:
    enabled: false
  cors:
    allowed-origins: http://localhost:3000
