spring:
  datasource:
    url: jdbc:h2:mem:ironkeytest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

ironkey:
  jwt:
    secret: dGhpcy1pcy1hLXRlc3Qtc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTY0LWNoYXJhY3RlcnMtbG9uZyEh
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  encryption:
    pepper: test_pepper_only_for_tests_32chars!
  recovery:
    enabled: false
  cors:
    allowed-origins: http://localhost:3000
