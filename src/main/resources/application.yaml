spring:
  application:
    name: ironkey

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ironkey_db}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

ironkey:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000       # 15 minutos en ms
    refresh-token-expiration: 604800000   # 7 días en ms
  encryption:
    pepper: ${ENCRYPTION_PEPPER}
  recovery:
    enabled: ${IRONKEY_RECOVERY_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/ironkey_db
    username: ironkey_user
    password: dev_password

  jpa:
    show-sql: true

ironkey:
  jwt:
    secret: dev_jwt_secret_only_for_local_never_use_in_production_must_be_64_chars_min
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000
  encryption:
    pepper: dev_pepper_only_for_local_32chars_x
  recovery:
    enabled: false
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
